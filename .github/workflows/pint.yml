name: Laravel Pint Linting
on: pull_request
jobs:
  phplint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Explicit PHP 8.4 + Pint uit project-vendor i.p.v. de aglipanci-
      # action: die draait op `composer:latest` (PHP 8.3) en faalde dan
      # op format-issues die Pint 1.29.0 onder PHP 8.4 lokaal niet ziet.
      # Zo matcht CI exact de lokale Sail-environment (PHP 8.4 + composer.lock).
      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none

      # --no-scripts: skip artisan package:discover / filament:upgrade die
      # tijdens autoload-dump draaien — Pint heeft die niet nodig en ze
      # boot'en de hele app (Filament-panels enz.) wat de CI eerder deed
      # vastlopen op een undefined-property error.
      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist --no-scripts

      - name: Run Pint (laravel preset, test mode)
        run: ./vendor/bin/pint --preset=laravel --test
