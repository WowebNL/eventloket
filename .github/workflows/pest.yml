name: PestPHP unit Tests
on:
  pull_request:
  workflow_dispatch:

jobs:
  laravel-tests:
    runs-on: ubuntu-latest
    name: Run Unit Tests
    services:
      # The application requires PostgreSQL with PostGIS (municipalities store
      # spatial geometry and a migration runs CREATE EXTENSION postgis), so the
      # test database must be PostGIS-enabled. MySQL cannot run the migrations.
      postgres:
        image: postgis/postgis:17-3.5
        env:
          POSTGRES_DB: testing
          POSTGRES_USER: sail
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready -U sail -d testing" --health-interval=10s --health-timeout=5s --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Install PHP versions
      uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
      with:
        php-version: 8.4
        extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, pgsql, pdo_pgsql, bcmath, soap, intl, gd, exif, iconv, imagick, redis
        coverage: none

    - name: Setup NodeJS
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: 22

    - name: Install NodeJS dependencies
      run: |
        npm install

    - name: Install Composer dependencies
      run: composer install --no-interaction --prefer-dist --optimize-autoloader

    - name: Prepare application
      run: |
        cp .env.example .env
        php artisan key:generate
        php artisan passport:keys
        npm run build
    - name: Execute tests via PestPHP
      env:
        APP_ENV: testing
        DB_CONNECTION: pgsql
        DB_DATABASE: testing
        DB_USERNAME: sail
        DB_PASSWORD: password
        DB_HOST: 127.0.0.1
        DB_PORT: 5432
        REDIS_HOST: 127.0.0.1
        REDIS_PORT: 6379
      run: vendor/bin/pest
