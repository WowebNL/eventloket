server {
    listen 80;
    server_name _;

    # Forward all requests to the Open Forms Django/gunicorn backend
    location / {
        # The Open Forms SDK sends requests with credentials: 'include' (session cookies).
        # The CORS spec forbids Access-Control-Allow-Origin: * for credentialed requests;
        # the header must echo back the exact requesting Origin.
        # We use $http_origin so any origin is reflected (local dev only — not for production).
        add_header 'Access-Control-Allow-Origin'      $http_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Headers'     'Authorization, Content-Type, X-CSRFToken, X-OpenForms-Normalize' always;
        add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD' always;
        add_header 'Access-Control-Expose-Headers'    'Content-Disposition, X-CSRFToken, X-Session-Expires-In' always;

        # Handle CORS preflight without hitting the backend
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'      $http_origin;
            add_header 'Access-Control-Allow-Credentials' 'true';
            add_header 'Access-Control-Allow-Headers'     'Authorization, Content-Type, X-CSRFToken, X-OpenForms-Normalize';
            add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD';
            add_header 'Access-Control-Max-Age'           86400;
            add_header 'Content-Length'                   0;
            return 204;
        }

        proxy_pass         http://open-forms:8000;
        proxy_set_header   Host              $host:8003;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Strip CORS headers set by Django's corsheaders middleware so that
        # nginx's add_header directives above are the sole source of truth.
        # Without this, both headers are forwarded and the browser rejects the
        # duplicate 'Access-Control-Allow-Origin' values.
        proxy_hide_header  Access-Control-Allow-Origin;
        proxy_hide_header  Access-Control-Allow-Headers;
        proxy_hide_header  Access-Control-Allow-Methods;
        proxy_hide_header  Access-Control-Allow-Credentials;
        proxy_hide_header  Access-Control-Expose-Headers;
        proxy_hide_header  Access-Control-Max-Age;

        # Increase timeouts for slow form submissions / file uploads
        proxy_connect_timeout 60s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;

        # Allow large file uploads (e.g. form attachment fields)
        client_max_body_size 50m;
    }
}

